
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizontal Align</title>
    <style>
        .container {
            width: 1200px;
            margin: 0 auto;
            background-color: red;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .content {
          height: 200px;
          margin: 0 auto;
          background-color: yellow;
          width: 200px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="content">
          <h1>Hello World</h1>
        </div>
    </div>
</body>

</html>
